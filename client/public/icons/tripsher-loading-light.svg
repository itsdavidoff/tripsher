<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glass-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="edge-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.25" />
    </linearGradient>
    <linearGradient id="plane-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" />
      <stop offset="60%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <style>
    @keyframes floatPlaneLight {
      0%, 100% { transform: translate(56px, 30px) rotate(-45deg) translateY(0px); }
      50% { transform: translate(56px, 30px) rotate(-45deg) translateY(-5px); }
    }
    @keyframes pulseTrailLight {
      0%, 100% { stroke-dashoffset: 0; opacity: 0.85; }
      50% { stroke-dashoffset: -12; opacity: 0.5; }
    }
    .plane-anim { animation: floatPlaneLight 1.8s ease-in-out infinite; }
    .trail-anim { animation: pulseTrailLight 1.5s linear infinite; stroke-dasharray: 6 6; }
  </style>

  <rect x="6" y="6" width="88" height="88" rx="26" fill="url(#glass-light)" stroke="url(#edge-light)" stroke-width="2.5" />
  
  <g transform="translate(10, 10)">
    <!-- Curved Takeoff Trail -->
    <path class="trail-anim" d="M 18 68 C 26 68 38 60 48 44" fill="none" stroke="url(#plane-light)" stroke-width="5" stroke-linecap="round" />
    <path d="M 14 72 C 21 72 32 64 42 50" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.4" stroke-dasharray="3 3" />

    <!-- Sleek Taking-off Airplane Silhouette -->
    <g class="plane-anim">
      <path d="M 0 -20 C 3 -12 6 -3 6 4 L 20 11 L 20 16 L 6 13 L 4 23 L 9 27 L 9 30 L 0 27 L -9 30 L -9 27 L -4 23 L -6 13 L -20 16 L -20 11 L -6 4 C -6 -3 -3 -12 0 -20 Z" fill="url(#plane-light)" />
    </g>
  </g>
</svg>
