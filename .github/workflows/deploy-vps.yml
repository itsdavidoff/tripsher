name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create deployment archive
        run: |
          tar -czf tripsher-deploy.tar.gz \
            --exclude="node_modules" \
            --exclude=".git" \
            --exclude="tripsher-deploy.tar.gz" \
            --exclude="*.log" \
            .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to VPS
        run: |
          scp -o StrictHostKeyChecking=no \
            tripsher-deploy.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            
            # Create backup
            if [ -d /opt/tripsher ]; then
              cd /opt/tripsher
              tar -czf /tmp/tripsher-backup-$(date +%Y%m%d-%H%M%S).tar.gz .
            fi
            
            # Extract new version
            mkdir -p /opt/tripsher
            tar -xzf /tmp/tripsher-deploy.tar.gz -C /opt/tripsher
            
            # Install dependencies
            cd /opt/tripsher
            npm ci --production
            
            # Build if needed
            if [ ! -d "client/dist" ] || [ ! -d "server/dist" ]; then
              npm run build
            fi
            
            # Restart service
            systemctl restart tripsher || true
            
            # Cleanup
            rm /tmp/tripsher-deploy.tar.gz
            
            echo "Deployment completed successfully"
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "systemctl status tripsher --no-pager || true"

      - name: Cleanup
        run: rm tripsher-deploy.tar.gz
